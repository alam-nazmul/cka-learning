---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloworld
    spec:
        containers:
          - name: nginx-webserver
            image: {{  .Values.image.repository }}
            ports:
              - containerPort: 80
